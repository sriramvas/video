
<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #101016;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .modal {
    width: 392px;
    background: #101016;
    border-radius: 16px;
    border: 1px solid #1D1D22;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .search-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    background: #101016;
    border-bottom: 1px solid #1D1D22;
  }
  .search-row input {
    background: transparent;
    border: none;
    outline: none;
    color: #f0f1f3;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    line-height: 23px;
    width: 100%;
  }
  .search-row input::placeholder { color: #2e2e35; font-weight: 400; }

  .tabs {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    background: #101016;
    border-bottom: 1px solid #1D1D22;
  }
  .tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 8px;
    border-radius: 8px;
    border: 1px solid #1D1D22;
    font-size: 13px;
    font-weight: 600;
    line-height: 23px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    background: #101016;
    color: #47474A;
    transition: all 0.12s;
    white-space: nowrap;
  }
  .tab.active {
    background: #101016;
    color: #ffffff;
    border-color: #39393B;
  }
  .tab:hover:not(.active) {
    color: #666668;
    border-color: #28282d;
  }

  .list {
    height: 335px;
    overflow-y: auto;
    background: #101016;
    flex-shrink: 0;
  }
  .list::-webkit-scrollbar { width: 3px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  .row {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 11px 16px;
    height: 67px;
    cursor: pointer;
    border-bottom: 1px solid #1A1A20;
    transition: background 0.1s;
    box-sizing: border-box;
    background: #101016;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: #15151c; }

  .logo {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #1a1a20;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: block; }
  .logo .fb { color: #fff; font-size: 11px; font-weight: 700; font-family: 'Inter', sans-serif; }

  .info { flex: 1; min-width: 0; }
  .t1 {
    color: #f0f1f3;
    font-size: 15px;
    font-weight: 600;
    line-height: 23px;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: baseline;
  }
  .tick {
    color: #6e707a;
    font-size: 12px;
    font-weight: 400;
    line-height: 16px;
    font-family: 'JetBrains Mono', monospace;
    margin-left: 6px;
  }
  .t2 {
    color: #6e707a;
    font-size: 12px;
    font-weight: 400;
    line-height: 16px;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  .chg {
    font-size: 12px;
    font-weight: 600;
    line-height: 16px;
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .pos { color: #00d47e; }
  .neg { color: #f0455a; }

  .nores {
    height: 335px;
    display: none;
    align-items: center;
    justify-content: center;
    color: #2e2e35;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    background: #101016;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="modal">
  <div class="search-row">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2e2e35" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="si" type="text" placeholder="Search tokens..." oninput="fil()" />
  </div>

  <div class="tabs">
    <button class="tab active" onclick="st('crypto',this)">Crypto</button>
    <button class="tab" onclick="st('rwa',this)">RWAs</button>
    <button class="tab" onclick="st('defi',this)">DeFi</button>
    <button class="tab" onclick="st('memes',this)">Memes</button>
  </div>

  <div class="list" id="tl"></div>
  <div class="nores" id="nores">No results found</div>
</div>

<script>
var DATA = {
  crypto: [
    { name:'Bitcoin',     tick:'CBBTC', price:'$80,100.00', vol:'$3.21M', chg:'+1.94%', pos:true,  img:'https://wsrv.nl/?url=https%3A%2F%2Fnftstorage.link%2Fipfs%2FQmZ7L8yd5j36oXXydUiYFiFsRHbi3EdgC4RuFwvM7dcqge', fb:'#f7931a', ft:'₿' },
    { name:'Ethereum',    tick:'ETH',   price:'$2,320.00',  vol:'$1.87M', chg:'+1.87%', pos:true,  img:'https://cdn.jsdelivr.net/gh/atomiclabs/cryptocurrency-icons@master/svg/color/eth.svg', fb:'#627eea', ft:'Ξ' },
    { name:'Solana',      tick:'SOL',   price:'$93.23',     vol:'$2.44M', chg:'+4.63%', pos:true,  img:'https://raw.githubusercontent.com/solana-labs/token-list/main/assets/mainnet/So11111111111111111111111111111111111111112/logo.png', fb:'#9945ff', ft:'S' },
    { name:'Hyperliquid', tick:'HYPE',  price:'$43.52',     vol:'$0.98M', chg:'+1.53%', pos:true,  img:'https://iakf2rukptai4d5fe4jekmvsrg5747iltadonpsy5pbo5w4jzcna.arweave.net/QBRdRop8wI4PpScSRTKyibv-fQuYBua-WOvC7tuJyJo', fb:'#4dd9c0', ft:'H' },
    { name:'ZCash',       tick:'ZEC',   price:'$600.50',    vol:'$0.74M', chg:'+0.00%', pos:true,  img:'https://ietcvhtapm2ysqpopvi6vph536ldj3ozkevuwsfyu63jvb7zjina.arweave.net/QSYqnmB7NYlB7n1R6rz935Y07dlRK0tIuKe2mof5Sho', fb:'#e8a328', ft:'Z' }
  ],
  rwa: [
    { name:'Gold',        tick:'XAU',  price:'$4,345.00', vol:'$4.12M', chg:'+0.44%', pos:true,  img:'https://wsrv.nl/?url=https%3A%2F%2Fnftstorage.link%2Fipfs%2Fbafkreibth2yh4jlehmf5nmfgy763z4yvwxlz7zmuohmhp53un6wrho5t2q', fb:'#d4a017', ft:'Au' },
    { name:'Silver',      tick:'XAG',  price:'$80.72',    vol:'$1.55M', chg:'+0.21%', pos:true,  img:null, fb:'#8a9baa', ft:'Ag' },
    { name:'SP 500', tick:'SPYx', price:'$745.94',   vol:'$3.88M', chg:'+0.54%', pos:true,  img:'https://xstocks-metadata.backed.fi/logos/tokens/SPYx.png', fb:'#003087', ft:'S' },
    { name:'NVIDIA',      tick:'NVDA', price:'$216.66',   vol:'$2.67M', chg:'+3.21%', pos:true,  img:'https://xstocks-metadata.backed.fi/logos/tokens/NVDAx.png', fb:'#76b900', ft:'N' },
    { name:'Tesla',       tick:'TSLA', price:'$428.39',   vol:'$4.33M', chg:'-1.45%', pos:false, img:'https://xstocks-metadata.backed.fi/logos/tokens/TSLAx.png', fb:'#cc0000', ft:'T' }
  ],
  defi: [
    { name:'Jupiter',  tick:'JUP',  price:'$0.24',   vol:'$2.11M', chg:'+3.18%',  pos:true, img:'https://static.jup.ag/jup/icon.png', fb:'#e86b2a', ft:'J' },
    { name:'Pump', tick:'PUMP', price:'$0.0021', vol:'$1.39M', chg:'+12.40%', pos:true, img:'https://wsrv.nl/?url=https%3A%2F%2Fnftstorage.link%2Fipfs%2Fbafkreibyb3hcn7gglvdqpmklfev3fut3eqv3kje54l3to3xzxxbgpt5wjm', fb:'#9333ea', ft:'P' },
    { name:'Jito',     tick:'JTO',  price:'$0.51',   vol:'$0.88M', chg:'+5.33%',  pos:true, img:'https://metadata.jito.network/token/jto/image', fb:'#16a34a', ft:'J' },
    { name:'Kamino',   tick:'KMNO', price:'$0.024',  vol:'$3.47M', chg:'+7.92%',  pos:true, img:'https://cdn.kamino.com/kamino.svg', fb:'#0ea5e9', ft:'K' }
  ],
  memes: [
    { name:'Bonk',  tick:'BONK',  price:'$0.000007', vol:'$1.22M', chg:'+11.03%', pos:true, img:'https://quei6zhlcfsxdfyes577gy7bkxmuz7qqakyt72xlbkyh7fysmoza.arweave.net/hQiPZOsRZXGXBJd_82PhVdlM_hACsT_q6wqwf5cSY7I', fb:'#f97316', ft:'B' },
    { name:'TRUMP', tick:'TRUMP', price:'$2.45',      vol:'$3.14M', chg:'+6.80%',  pos:true, img:'https://kufm7daawcoqizwf2kau5i3qhywkr244pmwaj67ppn6ctxwya46a.arweave.net/VQrPjACwnQRmxdKBTqNwPiyo65x7LAT773t8Kd7YBzw', fb:'#c8102e', ft:'T' },
    { name:'WIF',   tick:'WIF',   price:'$0.22',      vol:'$0.55M', chg:'+8.57%',  pos:true, img:'https://wsrv.nl/?url=https%3A%2F%2Fnftstorage.link%2Fipfs%2Fbafkreibk3covs5ltyqxa272uodhculbr6kea6betidfwy3ajsav2vjzyum', fb:'#7c3aed', ft:'W' }
  ]
};

function makeIcon(item) {
  if (!item.img) {
    return '<div class="logo" style="background:' + item.fb + '"><span class="fb">' + item.ft + '</span></div>';
  }
  var id = 'lg_' + item.tick.replace(/[^a-zA-Z0-9]/g, '') + '_' + Math.floor(Math.random() * 999999);
  var onErr = "this.style.display='none';" +
    "var s=document.createElement('span');" +
    "s.className='fb';" +
    "s.textContent='" + item.ft + "';" +
    "var p=document.getElementById('" + id + "');" +
    "if(p){p.appendChild(s);p.style.background='" + item.fb + "';}";
  return '<div class="logo" id="' + id + '"><img src="' + item.img + '" onerror="' + onErr + '" /></div>';
}

function render(arr) {
  var html = '';
  for (var i = 0; i < arr.length; i++) {
    var d = arr[i];
    html += '<div class="row" data-s="' + d.name.toLowerCase() + ' ' + d.tick.toLowerCase() + '">';
    html += makeIcon(d);
    html += '<div class="info">';
    html += '<div class="t1">' + d.name + '<span class="tick">' + d.tick + '</span></div>';
    html += '<div class="t2">' + d.price + ' &nbsp;·&nbsp; Vol: ' + d.vol + '</div>';
    html += '</div>';
    html += '<div class="chg ' + (d.pos ? 'pos' : 'neg') + '">' + d.chg + '</div>';
    html += '</div>';
  }
  document.getElementById('tl').innerHTML = html;
  document.getElementById('tl').style.display = 'block';
  document.getElementById('nores').style.display = 'none';
}

function st(tab, btn) {
  document.querySelectorAll('.tab').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('si').value = '';
  render(DATA[tab]);
}

function fil() {
  var q = document.getElementById('si').value.toLowerCase();
  var rows = document.querySelectorAll('.row');
  var visible = 0;
  rows.forEach(function(r) {
    var show = r.getAttribute('data-s').indexOf(q) !== -1;
    r.style.display = show ? 'flex' : 'none';
    if (show) visible++;
  });
  document.getElementById('tl').style.display = visible === 0 ? 'none' : 'block';
  document.getElementById('nores').style.display = visible === 0 ? 'flex' : 'none';
}

render(DATA['crypto']);
</script>
</body>
</html>
